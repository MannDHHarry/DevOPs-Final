upstream app_servers {
    server app:3000;
}

server {
    listen 80;
    server_name vestarex20.shop www.vestarex20.shop;

    # Certbot challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vestarex20.shop www.vestarex20.shop;

    ssl_certificate /etc/letsencrypt/live/vestarex20.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vestarex20.shop/privkey.pem;

    # Main Application
    location / {
        proxy_pass http://app_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prometheus Proxy
    location /prometheus/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Grafana Proxy
# Grafana Reverse Proxy
    location /grafana/ {
        proxy_set_header Host $host;
        proxy_pass http://grafana:3000; # No trailing slash here is usually safer for Grafana
        
        # Standard proxy headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fix for Grafana web sockets (needed for live dashboards)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
