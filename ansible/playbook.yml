---
- name: Configure DevOps Final Server
  hosts: server
  become: true   # run as sudo

  tasks:

    # ── 1. System update ─────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist

    # ── 2. Install dependencies ──────────────────────────────
    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
        state: present

    # ── 3. Install Docker ────────────────────────────────────
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
        state: present

    - name: Install Docker and Docker Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    # ── 4. Configure Docker service ──────────────────────────
    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Remove host nginx (conflicts with Docker nginx on port 80/443)
      apt:
        name:
          - nginx
          - nginx-common
          - nginx-core
        state: absent
        purge: yes
        autoremove: yes
      ignore_errors: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # ── 5. Clone project repo ────────────────────────────────
    - name: Clone DevOps-Final repository
      git:
        repo: "https://github.com/MannDHHarry/DevOPs-Final"
        dest: /home/ubuntu/DevOps-Final
        version: main
        force: yes
      become_user: ubuntu

    # ── 6. Set ownership ─────────────────────────────────────
    - name: Set repo ownership to ubuntu
      file:
        path: /home/ubuntu/DevOps-Final
        owner: ubuntu
        group: ubuntu
        recurse: yes

    # ── 7. Verify Docker works ───────────────────────────────
    - name: Verify Docker installation
      command: docker --version
      register: docker_ver

    - name: Print Docker version
      debug:
        msg: "{{ docker_ver.stdout }}"