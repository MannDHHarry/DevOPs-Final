global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'nodejs_app'
    static_configs:
      - targets: ['app:3000']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']