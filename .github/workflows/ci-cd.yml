name: CI/CD Pipeline
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
 
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-final-app
  DEPLOY_PATH: /home/ubuntu/DevOps-Final
 
jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — LINT & VALIDATE
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package.json
 
      - name: Install dependencies
        working-directory: app
        run: npm install
 
      - name: Run ESLint
        working-directory: app
        run: npm run lint
        continue-on-error: false   # fail the pipeline on lint errors
 
      - name: Validate docker-compose syntax
        run: docker compose config --quiet
 # ─────────────────────────────────────────────
  # JOB 2 — BUILD & PUSH DOCKER IMAGE
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: lint
    # Only build on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
 
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      # Generate tags: git short SHA + "latest"
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
 
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────────────
  # JOB 3 — DEPLOY TO EC2 VIA SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/devops-final-key.pem
          chmod 600 ~/.ssh/devops-final-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
 
      # Push latest docker-compose.yml and nginx config to the server
      - name: Sync config files to EC2
        run: |
          scp -i ~/.ssh/devops-final-key.pem \
            docker-compose.yml \
            ubuntu@${{ secrets.EC2_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.yml

          scp -i ~/.ssh/devops-final-key.pem \
            nginx/default.conf \
            ubuntu@${{ secrets.EC2_HOST }}:${{ env.DEPLOY_PATH }}/nginx/default.conf

          scp -i ~/.ssh/devops-final-key.pem \
            prometheus/prometheus.yml \
            ubuntu@${{ secrets.EC2_HOST }}:${{ env.DEPLOY_PATH }}/prometheus/prometheus.yml

          scp -i ~/.ssh/devops-final-key.pem -r \
            grafana/provisioning \
            ubuntu@${{ secrets.EC2_HOST }}:${{ env.DEPLOY_PATH }}/grafana/
 
      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/devops-final-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
 
            cd ${{ env.DEPLOY_PATH }}
 
            echo "==> Pulling image ${{ needs.build.outputs.image_tag }}..."
            docker pull ${{ env.DOCKER_IMAGE }}:${{ needs.build.outputs.image_tag }}
 
            echo "==> Updating app image tag in compose..."
            # Replace whatever image tag is in docker-compose.yml with the new SHA tag
            sed -i "s|image: .*devops-final-app.*|image: ${{ env.DOCKER_IMAGE }}:${{ needs.build.outputs.image_tag }}|g" docker-compose.yml
 
            echo "==> Rolling restart of app (zero-downtime)..."
            # Scale up new replicas first, then remove old containers
            docker compose up -d --no-deps --scale app=4 app
            sleep 15
            docker compose up -d --no-deps --scale app=2 app
 
            echo "==> Reloading nginx config..."
            docker compose exec -T nginx nginx -s reload
 
            echo "==> Cleaning up unused images..."
            docker image prune -f
 
            echo "==> Deployment complete ✓"
          ENDSSH
 
  # ─────────────────────────────────────────────
  # JOB 4 — SMOKE TEST (post-deploy)
  # ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
 
    steps:
      - name: Wait for app to be ready
        run: sleep 20
 
      - name: Health check — HTTPS endpoint
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://vestarex20.shop/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Health check FAILED with status $STATUS"
            exit 1
          fi
          echo "Health check PASSED ✓"
 
      - name: Health check — /products endpoint
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://vestarex20.shop/products)
          echo "/products HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "/products check FAILED"
            exit 1
          fi
          echo "/products check PASSED ✓"
 
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Smoke test failed! Check https://vestarex20.shop and EC2 logs."
          echo "Deployment may need to be rolled back."
          exit 1
