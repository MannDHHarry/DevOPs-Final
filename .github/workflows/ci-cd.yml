name: CI/CD Pipeline
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
 
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-final-app
  DEPLOY_PATH: /home/ubuntu/DevOps-Final
 
jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — LINT & VALIDATE
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package.json
 
      - name: Install dependencies
        working-directory: app
        run: npm install
 
      - name: Run ESLint
        working-directory: app
        run: npm run lint
        continue-on-error: false   # fail the pipeline on lint errors
 
      - name: Validate docker-compose syntax
        run: docker compose config --quiet
