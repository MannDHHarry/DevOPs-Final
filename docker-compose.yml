services:
  db:
    image: mongo:7.0
    restart: always
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: akh2100/midterm-app:v1
    environment:
      - MONGO_URI=mongodb://db:27017/midterm 
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/usr/src/app/public/uploads
    deploy:
      replicas: 2 # Increased for robustness
      resources:
        limits:
          memory: 200M # Lowered slightly per replica to fit both in RAM

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443" # Opened for HTTPS
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot_etc:/etc/letsencrypt:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - webroot:/var/www/html
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      # This is the most important line:
      - '--web.external-url=https://akhdev.site/prometheus/'
      - '--web.route-prefix=/'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    # Ensure no ports are mapped here
    deploy:
      resources:
        limits:
          memory: 150M
  grafana:
    image: grafana/grafana:latest
    container_name: devops-final-grafana
    restart: always
    # IMPORTANT: Remove 'ports' if you want it only accessible via HTTPS domain
    # ports:
    #   - "3001:3000"
    environment:
      - GF_SERVER_DOMAIN=akhdev.site
      - GF_SERVER_ROOT_URL=https://akhdev.site/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_PASSWORD=admin # Change this after your first login
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 200M

# Monitoring services (Prom/Graf) stay the same as before...

volumes:
  mongo_data:
  uploads_data:
  grafana_data:
  certbot_etc:
  certbot_var:
  webroot:
