services:
  db:
    image: mongo:7.0
    restart: always
    volumes:
      - mongo_data:/data/db
      - mongo_configdb:/data/configdb
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: akh2100/devops-final-app:latest
    restart: always
    environment:
      - MONGO_URI=mongodb://db:27017/midterm
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/usr/src/app/public/uploads
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 200M

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_etc:/etc/letsencrypt:ro
      - webroot:/var/www/html:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - webroot:/var/www/html
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: always
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    deploy:
      resources:
        limits:
          memory: 128M

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: always
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    deploy:
      resources:
        limits:
          memory: 64M

  prometheus:
    image: prom/prometheus:latest
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.external-url=https://vestarex20.shop/prometheus/'
      - '--web.route-prefix=/'
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    deploy:
      resources:
        limits:
          memory: 150M

  grafana:
    image: grafana/grafana:10.4.3
    container_name: devops-final-grafana
    restart: always
    environment:
      - GF_SERVER_DOMAIN=vestarex20.shop
      - GF_SERVER_ROOT_URL=https://vestarex20.shop/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    deploy:
      resources:
        limits:
          memory: 200M

volumes:
  mongo_data:
  mongo_configdb:
  uploads_data:
  grafana_data:
  certbot_etc:
  certbot_var:
  webroot:
  prometheus_data:
