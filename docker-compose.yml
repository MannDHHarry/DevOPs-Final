services:
  db:
    image: mongo:7.0
    restart: always
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: akh2100/midterm-app:v1
    environment:
      - MONGO_URI=mongodb://db:27017/midterm 
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/usr/src/app/public/uploads
    deploy:
      replicas: 2 # Increased for robustness
      resources:
        limits:
          memory: 200M # Lowered slightly per replica to fit both in RAM

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443" # Opened for HTTPS
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot_etc:/etc/letsencrypt:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - webroot:/var/www/html
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# Monitoring services (Prom/Graf) stay the same as before...
  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 150M

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3001:3000" # Mapping to 3001 to avoid any potential port conflicts
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Change this later!
    deploy:
      resources:
        limits:
          memory: 200M
    depends_on:
      - prometheus
volumes:
  mongo_data:
  uploads_data:
  grafana_data:
  certbot_etc:
  certbot_var:
  webroot:
